<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculadora de Faltas</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Faltei Senai</h1>

    <!-- 🔹 Legenda -->
    <div class="legenda">
      <h2>📘 Legenda de Carga Horária</h2>
      <ul>
        <li>1 aula por semana → <b>30h</b></li>
        <li>2 aulas por semana → <b>60h</b></li>
        <li>3 aulas por semana → <b>90h</b></li>
        <li>Práticas Integradas → <b>90h presenciais</b></li>
      </ul>
    </div>

    <!-- 🔹 Entradas -->
    <label for="hsemestre">Horas da matéria:</label>
    <input type="number" id="hsemestre" placeholder="Ex: 60" min="1" />

    <label for="faltasa">Dias faltados:</label>
    <input type="number" id="faltasa" placeholder="Ex: 2" min="0" />

    <button onclick="calcular()">Calcular</button>

    <div id="resultado"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
