<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Faltei Senai: Calculadora para descobrir quantas faltas você ainda tem." />
  <meta name="keywords" content="faltei senai, faltas senai, calculadora faltas, senai faltas, falteisenai" />
  <title>Faltei Senai - Calculadora de Faltas</title>
  <link rel="canonical" href="https://victorbarretoandrade.github.io/FalteiSenai/" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Faltei Senai</h1>

    <p class="intro">Coloque suas faltas do portal SENAI para saber quantos dias você ainda pode faltar.</p>

    <!-- Seletor de carga horária -->
    <label>Aulas por semana:</label>
    <div class="opcoes-grade">
      <button class="opcao-btn" data-horas="15" data-faltas-por-dia="2" onclick="selecionarHoras(this)">
        <span class="opcao-label">Desafio/Trilha</span>
        <span class="opcao-horas">15h</span>
      </button>
      <button class="opcao-btn" data-horas="30" data-faltas-por-dia="2" onclick="selecionarHoras(this)">
        <span class="opcao-label">1 aula/sem</span>
        <span class="opcao-horas">30h</span>
      </button>
      <button class="opcao-btn" data-horas="60" data-faltas-por-dia="2" onclick="selecionarHoras(this)">
        <span class="opcao-label">2 aulas/sem</span>
        <span class="opcao-horas">60h</span>
      </button>
      <button class="opcao-btn" data-horas="90" data-faltas-por-dia="2" onclick="selecionarHoras(this)">
        <span class="opcao-label">3 aulas/sem</span>
        <span class="opcao-horas">90h</span>
      </button>
      <button class="opcao-btn" data-horas="105" data-faltas-por-dia="2" onclick="selecionarHoras(this)">
        <span class="opcao-label">Práticas Int.</span>
        <span class="opcao-horas">105h</span>
      </button>
      <button class="opcao-btn" data-horas="120" data-faltas-por-dia="4" onclick="selecionarHoras(this)">
        <span class="opcao-label">2 aulas/sem de 3h:20</span>
        <span class="opcao-horas">120h</span>
      </button>
    </div>

    <!-- Faltas -->
    <div class="campo-faltas-header">
      <label for="faltasa" id="label-faltasa">Número de faltas:</label>
      <div class="toggle-mode">
        <button id="btn-faltas" class="mode-btn active" onclick="setMode('faltas')">Faltas</button>
        <button id="btn-dias" class="mode-btn" onclick="setMode('dias')">Dias</button>
      </div>
    </div>
    <input type="number" id="faltasa" placeholder="Ex: 4" min="0" step="1" />
    <small class="hint" id="hint-faltasa">Cole aqui exatamente o número que aparece no portal SENAI</small>

    <button onclick="calcular()">Calcular</button>

    <div id="resultado"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
